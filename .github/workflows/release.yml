name: Release

on:
  push:
    tags:
    - v*

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
    - run: cargo test

  build:
    needs: test
    strategy:
      matrix:
        include:
        - target: x86_64-unknown-linux-gnu
          os: ubuntu-latest
          artifact: tetra-master-adviser-linux.zip
          binary: tetra-master-adviser
        - target: x86_64-pc-windows-msvc
          os: windows-latest
          artifact: tetra-master-adviser-windows.zip
          binary: tetra-master-adviser.exe
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
    - uses: Swatinem/rust-cache@v2
    - run: cargo build --release --target ${{ matrix.target }}
    - name: Zip artifact (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: zip ${{ matrix.artifact }} target/${{ matrix.target }}/release/${{ matrix.binary }}
    - name: Zip artifact (Windows)
      if: matrix.os == 'windows-latest'
      run: Compress-Archive -Path target/${{ matrix.target }}/release/${{ matrix.binary }} -DestinationPath ${{ matrix.artifact }}
      shell: pwsh
    - uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact }}
        path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        merge-multiple: true
    - name: Create GitHub release
      id: gh_release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          tetra-master-adviser-linux.zip
          tetra-master-adviser-windows.zip
