name: Release

on:
  push:
    branches:
    - main

jobs:
  check-tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_tag.outputs.version }}
      tag: ${{ steps.get_tag.outputs.tag }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Check if commit is tagged
      id: get_tag
      run: |
        TAG=$(git tag --points-at HEAD | grep '^v' | head -n1)
        echo "tag=${TAG}" >> $GITHUB_OUTPUT
        echo "version=${TAG#v}" >> $GITHUB_OUTPUT

  test:
    needs: check-tag
    if: needs.check-tag.outputs.version != ''
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
    - run: cargo test

  build:
    needs: [check-tag, test]
    strategy:
      matrix:
        include:
        - target: x86_64-unknown-linux-gnu
          os: ubuntu-latest
          artifact: tetra-master-adviser-linux.zip
          binary: tetra-master-adviser
        - target: x86_64-pc-windows-msvc
          os: windows-latest
          artifact: tetra-master-adviser-windows.zip
          binary: tetra-master-adviser.exe
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
    - uses: Swatinem/rust-cache@v2
    - run: cargo build --release --target ${{ matrix.target }}
    - name: Zip artifact (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: zip ${{ matrix.artifact }} target/${{ matrix.target }}/release/${{ matrix.binary }}
    - name: Zip artifact (Windows)
      if: matrix.os == 'windows-latest'
      run: Compress-Archive -Path target/${{ matrix.target }}/release/${{ matrix.binary }} -DestinationPath ${{ matrix.artifact }}
      shell: pwsh
    - uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact }}
        path: ${{ matrix.artifact }}

  release:
    needs: [check-tag, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        merge-multiple: true
    - name: Create GitHub release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.check-tag.outputs.tag }}
        files: |
          tetra-master-adviser-linux.zip
          tetra-master-adviser-windows.zip

    - name: Upload Linux to Nexus Mods
      uses: Nexus-Mods/upload-action@v1.0.0-beta.4
      with:
        api_key: ${{ secrets.NEXUSMODS_API_KEY }}
        file_group_id: ${{ secrets.NEXUSMODS_FILE_GROUP_ID }}
        filename: tetra-master-adviser-linux.zip
        display_name: Tetra Master Adviser Linux ${{ needs.check-tag.outputs.tag }}
        version: ${{ needs.check-tag.outputs.version }}
        file_category: main

    - name: Upload Windows to Nexus Mods
      uses: Nexus-Mods/upload-action@v1.0.0-beta.4
      with:
        api_key: ${{ secrets.NEXUSMODS_API_KEY }}
        file_group_id: ${{ secrets.NEXUSMODS_FILE_GROUP_ID }}
        filename: tetra-master-adviser-windows.zip
        display_name: Tetra Master Adviser Windows ${{ needs.check-tag.outputs.tag }}
        version: ${{ needs.check-tag.outputs.version }}
        file_category: main
